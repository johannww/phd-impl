syntax = "proto3";

package pb;

option go_package = "github.com/johannww/phd-impl/chaincodes/common/internal/pb";

message VirtualTokenWallet {
  string owner = 1;
  int64 quantity = 2;
  int64 number = 3;
}

message VirtualTokenUTXO {
  string ownerID = 1;
  int64 amount = 2;
  string txID = 3;
}

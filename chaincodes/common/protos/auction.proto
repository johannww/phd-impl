syntax = "proto3";

package pb;

option go_package = "github.com/johannww/phd-impl/chaincodes/common/internal/pb";

import "properties.proto";
import "bids.proto";

// AuctionCommitment stores a commitment (hash) of serialized auction data keyed by auction end timestamp.
message AuctionCommitment {
  string endTimestamp = 1;
  bytes hash = 2;
}

// AuctionType is a simple wrapper to store the auction mode as a string (independent|coupled).
message AuctionType {
  string value = 1;
}

// AuctionData represents the complete auction data including bids, policies, and companies.
message AuctionData {
  uint64 auctionID = 1;
  repeated SellBid sellBids = 2;
  repeated BuyBid buyBids = 3;
  bytes bidsMerkleRoot = 4;
  repeated string activePolicies = 5;
  map<string, Company> companiesPvt = 6;
  bool coupled = 7;
}

// SerializedAuctionData represents serialized auction data with its hash commitment.
message SerializedAuctionData {
  bytes auctionDataBytes = 1;
  bytes sum = 2;
}

// OffChainIndepAuctionResult represents the result of an independent off-chain auction
// with matched bids and adjusted bids (public and private components if applicable).
message OffChainIndepAuctionResult {
  uint64 auctionID = 1;
  repeated MatchedBid matchedBids = 2;
  repeated SellBid adjustedSellBids = 3;
  repeated BuyBid adjustedBuyBids = 4;
}

// OffChainCoupledAuctionResult represents the result of a coupled off-chain auction
// with separate matched bids and adjusted bids for public and private components.
message OffChainCoupledAuctionResult {
  repeated MatchedBid matchedBidsPublic = 1;
  repeated MatchedBid matchedBidsPrivate = 2;
  repeated SellBid adjustedSellBidsPublic = 3;
  repeated SellBid adjustedSellBidsPrivate = 4;
  repeated BuyBid adjustedBuyBidsPublic = 5;
  repeated BuyBid adjustedBuyBidsPrivate = 6;
  uint64 auctionID = 7; // to avoid marshalling conflicts with OffChainIndepAuctionResult
}

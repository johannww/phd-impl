on:
  push:
    branches:
      - main
      - experiments
    paths:
      - "data_api/**"
      - ".github/workflows/data_api.yaml"
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  docker-build:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
          logout: false

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          push: true
          context: "data_api/"
          file: "data_api/Dockerfile"
          tags: ghcr.io/${{ github.repository }}/data-api:latest
          cache-from: type=registry,ref=ghcr.io/${{ github.repository }}/data-api:latest
          cache-to: type=inline

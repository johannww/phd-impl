on:
  push:
    branches:
      - main
      - experiments
    paths:
      - "chaincodes/carbon/**"
      - "chaincodes/interop/**"
      - ".github/workflows/chaincode.yaml"
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-test-chaincode:
    env:
      GOPRIVATE: github.com/${{ github.repository }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        chaincode: [carbon, interop]
    defaults:
      run:
        working-directory: chaincodes/${{ matrix.chaincode }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Go
        uses: actions/setup-go@v2
        with:
          go-version: 1.26

      - name: Configure git for private modules
        env:
          TOKEN: ${{ github.token }}
        run: git config --global url."https://user:${TOKEN}@github.com".insteadOf "https://github.com"

      - name: Build chaincode
        run: go work vendor && go build -o ${{ matrix.chaincode }} ./cmd/${{ matrix.chaincode }}/main.go

      - name: Run the tests
        run: go test --tags=testing ./tests

  # I had to grant package access in: https://github.com/johannww?tab=packages
  docker-chaincode-build:
    env:
      GOPRIVATE: github.com/${{ github.repository }}
    needs: build-test-chaincode
    runs-on: ubuntu-latest
    strategy:
      matrix:
        chaincode: [carbon, interop]
    permissions:
      packages: write
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
          logout: false

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v3
        with:
          images: ghcr.io/${{ github.repository }}/${{ matrix.chaincode }}

      - name: Configure git for private modules
        env:
          TOKEN: ${{ github.token }}
        run: git config --global url."https://user:${TOKEN}@github.com".insteadOf "https://github.com"

      - name: Vendor outside the container
        working-directory: chaincodes/${{ matrix.chaincode }}
        run: go work vendor

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          push: true
          context: "."
          file: "chaincodes/${{ matrix.chaincode }}/Dockerfile"
          tags: ghcr.io/${{ github.repository }}/${{ matrix.chaincode }}:latest
          cache-from: type=registry,ref=ghcr.io/${{ github.repository }}/${{ matrix.chaincode }}:latest
          cache-to: type=inline

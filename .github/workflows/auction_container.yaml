on:
  push:
    branches:
      - main
      - experiments
    paths:
      - "tee_auction/go/**"
      - ".github/workflows/auction_container.yaml"
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-test-auction:
    env:
      GOPRIVATE: github.com/${{ github.repository }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Go
        uses: actions/setup-go@v2
        with:
          go-version: 1.26

      - name: Configure git for private modules
        env:
          TOKEN: ${{ github.token }}
        run: git config --global url."https://user:${TOKEN}@github.com".insteadOf "https://github.com"

      - name: Build
        working-directory: tee_auction/go
        run: go work vendor && go build -o tee_auction ./cmd/auction/main.go

      - name: Run the tests
        working-directory: tee_auction/go
        run: go test --tags=testing ./...

  # I had to grant package access in: https://github.com/johannww?tab=packages
  docker-confidential-container-build:
    needs: build-test-auction
    env:
      GOPRIVATE: github.com/${{ github.repository }}
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
          logout: false

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v3
        with:
          images: ghcr.io/${{ github.repository }}/carbon_auction

      - name: Configure git for private modules
        env:
          TOKEN: ${{ github.token }}
        run: git config --global url."https://user:${TOKEN}@github.com".insteadOf "https://github.com"

      - name: Vendor outside the container
        run: go work vendor

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          push: true
          context: "."
          file: "tee_auction/Dockerfile"
          tags: ghcr.io/${{ github.repository }}/carbon_auction:latest
          cache-from: type=registry,ref=ghcr.io/${{ github.repository }}/carbon_auction:latest
          cache-to: type=inline


apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "fabric-experiments.name" . }}-configtx
  namespace: {{ include "fabric-experiments.namespace" . }}
  labels:
    {{- include "fabric-experiments.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation
data:
  configtx.yaml: |
    Organizations:
    {{- range $org := .Values.network.organizations }}
    {{- if gt (int (default 0 $org.orderers)) 0 }}
      - &{{ $org.name | title }}Orderer
        Name: {{ $org.name | title }}MSP
        ID: {{ $org.name | title }}MSP
        MSPDir: /workspace/organizations/ordererOrganizations/{{ $org.name }}/msp
        Policies:
          Readers:
            Type: Signature
            Rule: "OR('{{ $org.name | title }}MSP.member')"
          Writers:
            Type: Signature
            Rule: "OR('{{ $org.name | title }}MSP.member')"
          Admins:
            Type: Signature
            Rule: "OR('{{ $org.name | title }}MSP.admin')"
        OrdererEndpoints:
    {{- range $i, $_ := until (int (default 0 $org.orderers)) }}
          - {{ $org.name }}-orderer-{{ $i }}:7050
    {{- end }}
    {{- end }}
    {{- end }}
    {{- range $org := .Values.network.organizations }}
    {{- if gt (int (default 0 $org.peers)) 0 }}
      - &{{ $org.name | title }}Peer
        Name: {{ $org.name | title }}MSP
        ID: {{ $org.name | title }}MSP
        MSPDir: /workspace/organizations/peerOrganizations/{{ $org.name }}/msp
        Policies:
          Readers:
            Type: Signature
            Rule: "OR('{{ $org.name | title }}MSP.admin', '{{ $org.name | title }}MSP.peer', '{{ $org.name | title }}MSP.client')"
          Writers:
            Type: Signature
            Rule: "OR('{{ $org.name | title }}MSP.admin', '{{ $org.name | title }}MSP.client')"
          Admins:
            Type: Signature
            Rule: "OR('{{ $org.name | title }}MSP.admin')"
          Endorsement:
            Type: Signature
            Rule: "OR('{{ $org.name | title }}MSP.peer')"
        AnchorPeers:
          - Host: {{ $org.name }}-peer-0
            Port: 7051
    {{- end }}
    {{- end }}

    Capabilities:
      Channel: &ChannelCapabilities
        V3_0: true
      Orderer: &OrdererCapabilities
        V2_0: true
      Application: &ApplicationCapabilities
        V2_5: true

    Application: &ApplicationDefaults
      Organizations:
      Policies:
        Readers:
          Type: ImplicitMeta
          Rule: "ANY Readers"
        Writers:
          Type: ImplicitMeta
          Rule: "ANY Writers"
        Admins:
          Type: ImplicitMeta
          Rule: "MAJORITY Admins"
        LifecycleEndorsement:
          Type: ImplicitMeta
          Rule: "MAJORITY Endorsement"
        Endorsement:
          Type: ImplicitMeta
          Rule: "MAJORITY Endorsement"
      Capabilities:
        <<: *ApplicationCapabilities

    Orderer: &OrdererDefaults
      OrdererType: etcdraft
      BatchTimeout: 2s
      BatchSize:
        MaxMessageCount: 500
        AbsoluteMaxBytes: 10 MB
        PreferredMaxBytes: 2 MB
      EtcdRaft:
        Consenters:
    {{- range $org := .Values.network.organizations }}
    {{- if gt (int (default 0 $org.orderers)) 0 }}
    {{- range $i, $_ := until (int (default 0 $org.orderers)) }}
          - Host: {{ $org.name }}-orderer-{{ $i }}
            Port: 7050
            ClientTLSCert: /workspace/organizations/ordererOrganizations/{{ $org.name }}/orderers/orderer{{ $i }}.{{ $org.name }}/tls/server.crt
            ServerTLSCert: /workspace/organizations/ordererOrganizations/{{ $org.name }}/orderers/orderer{{ $i }}.{{ $org.name }}/tls/server.crt
    {{- end }}
    {{- end }}
    {{- end }}
      Organizations:
      Policies:
        Readers:
          Type: ImplicitMeta
          Rule: "ANY Readers"
        Writers:
          Type: ImplicitMeta
          Rule: "ANY Writers"
        Admins:
          Type: ImplicitMeta
          Rule: "MAJORITY Admins"
        BlockValidation:
          Type: ImplicitMeta
          Rule: "ANY Writers"
      Capabilities:
        <<: *OrdererCapabilities

    Channel: &ChannelDefaults
      Policies:
        Readers:
          Type: ImplicitMeta
          Rule: "ANY Readers"
        Writers:
          Type: ImplicitMeta
          Rule: "ANY Writers"
        Admins:
          Type: ImplicitMeta
          Rule: "MAJORITY Admins"
      Capabilities:
        <<: *ChannelCapabilities

    Profiles:
      TwoOrgsChannel:
        <<: *ChannelDefaults
        Consortium: SampleConsortium
        Orderer:
          <<: *OrdererDefaults
          Organizations:
    {{- range $org := .Values.network.organizations }}
    {{- if gt (int (default 0 $org.orderers)) 0 }}
            - *{{ $org.name | title }}Orderer
    {{- end }}
    {{- end }}
        Application:
          <<: *ApplicationDefaults
          Organizations:
    {{- range $org := .Values.network.organizations }}
    {{- if gt (int (default 0 $org.peers)) 0 }}
            - *{{ $org.name | title }}Peer
    {{- end }}
    {{- end }}
          Capabilities:
            <<: *ApplicationCapabilities

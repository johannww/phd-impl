apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "fabric-experiments.name" . }}-configtx
  namespace: {{ include "fabric-experiments.namespace" . }}
  labels:
    {{- include "fabric-experiments.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation
data:
  configtx.yaml: |
    Organizations:
    {{- range $org := .Values.network.organizations }}
    {{- if gt (int (default 0 $org.orderers)) 0 }}
      - &{{ $org.name | title }}Orderer
        Name: {{ $org.name | title }}MSP
        ID: {{ $org.name | title }}MSP
        MSPDir: /workspace/organizations/ordererOrganizations/{{ $org.name }}/msp
        Policies:
          Readers:
            Type: Signature
            Rule: "OR('{{ $org.name | title }}MSP.member')"
          Writers:
            Type: Signature
            Rule: "OR('{{ $org.name | title }}MSP.member')"
          Admins:
            Type: Signature
            Rule: "OR('{{ $org.name | title }}MSP.admin')"
        OrdererEndpoints:
    {{- range $i, $_ := until (int (default 0 $org.orderers)) }}
          - {{ $org.name }}-orderer-{{ $i }}:7050
    {{- end }}
    {{- end }}
    {{- end }}
    {{- range $org := .Values.network.organizations }}
    {{- if gt (int (default 0 $org.peers)) 0 }}
      - &{{ $org.name | title }}Peer
        Name: {{ $org.name | title }}MSP
        ID: {{ $org.name | title }}MSP
        MSPDir: /workspace/organizations/peerOrganizations/{{ $org.name }}/msp
        Policies:
          Readers:
            Type: Signature
            Rule: "OR('{{ $org.name | title }}MSP.admin', '{{ $org.name | title }}MSP.peer', '{{ $org.name | title }}MSP.client')"
          Writers:
            Type: Signature
            Rule: "OR('{{ $org.name | title }}MSP.admin', '{{ $org.name | title }}MSP.client')"
          Admins:
            Type: Signature
            Rule: "OR('{{ $org.name | title }}MSP.admin')"
          Endorsement:
            Type: Signature
            Rule: "OR('{{ $org.name | title }}MSP.peer')"
        AnchorPeers:
          - Host: {{ $org.name }}-peer-0
            Port: 7051
    {{- end }}
    {{- end }}

    Capabilities:
      Channel: &ChannelCapabilities
        V3_0: true
      Orderer: &OrdererCapabilities
        V2_0: true
      Application: &ApplicationCapabilities
        V2_5: true

    Application: &ApplicationDefaults
      ACLs: &ACLsDefault
        # This section provides defaults for policies for various resources
        # in the system. These "resources" could be functions on system chaincodes
        # (e.g., "GetBlockByNumber" on the "qscc" system chaincode) or other resources
        # (e.g.,who can receive Block events). This section does NOT specify the resource's
        # definition or API, but just the ACL policy for it.
        #
        # Users can override these defaults with their own policy mapping by defining the
        # mapping under ACLs in their channel definition

        #---New Lifecycle System Chaincode (_lifecycle) function to policy mapping for access control--#

        # ACL policy for _lifecycle's "CheckCommitReadiness" function
        _lifecycle/CheckCommitReadiness: /Channel/Application/Writers

        # ACL policy for _lifecycle's "CommitChaincodeDefinition" function
        _lifecycle/CommitChaincodeDefinition: /Channel/Application/Writers

        # ACL policy for _lifecycle's "QueryChaincodeDefinition" function
        _lifecycle/QueryChaincodeDefinition: /Channel/Application/Writers

        # ACL policy for _lifecycle's "QueryChaincodeDefinitions" function
        _lifecycle/QueryChaincodeDefinitions: /Channel/Application/Writers

        #---Lifecycle System Chaincode (lscc) function to policy mapping for access control---#

        # ACL policy for lscc's "getid" function
        lscc/ChaincodeExists: /Channel/Application/Readers

        # ACL policy for lscc's "getdepspec" function
        lscc/GetDeploymentSpec: /Channel/Application/Readers

        # ACL policy for lscc's "getccdata" function
        lscc/GetChaincodeData: /Channel/Application/Readers

        # ACL Policy for lscc's "getchaincodes" function
        lscc/GetInstantiatedChaincodes: /Channel/Application/Readers

        #---Query System Chaincode (qscc) function to policy mapping for access control---#

        # ACL policy for qscc's "GetChainInfo" function
        qscc/GetChainInfo: /Channel/Application/Readers

        # ACL policy for qscc's "GetBlockByNumber" function
        qscc/GetBlockByNumber: /Channel/Application/Readers

        # ACL policy for qscc's  "GetBlockByHash" function
        qscc/GetBlockByHash: /Channel/Application/Readers

        # ACL policy for qscc's "GetTransactionByID" function
        qscc/GetTransactionByID: /Channel/Application/Readers

        # ACL policy for qscc's "GetBlockByTxID" function
        qscc/GetBlockByTxID: /Channel/Application/Readers

        #---Configuration System Chaincode (cscc) function to policy mapping for access control---#

        # ACL policy for cscc's "GetConfigBlock" function
        cscc/GetConfigBlock: /Channel/Application/Readers

        # ACL policy for cscc's "GetChannelConfig" function
        cscc/GetChannelConfig: /Channel/Application/Readers

        #---Miscellaneous peer function to policy mapping for access control---#

        # ACL policy for invoking chaincodes on peer
        peer/Propose: /Channel/Application/Writers

        # ACL policy for chaincode to chaincode invocation
        peer/ChaincodeToChaincode: /Channel/Application/Writers

        #---Events resource to policy mapping for access control###---#

        # ACL policy for sending block events
        event/Block: /Channel/Application/Readers

        # ACL policy for sending filtered block events
        event/FilteredBlock: /Channel/Application/Readers
      Organizations:
      Policies:
        Readers:
          Type: ImplicitMeta
          Rule: "ANY Readers"
        Writers:
          Type: ImplicitMeta
          Rule: "ANY Writers"
        Admins:
          Type: ImplicitMeta
          Rule: "MAJORITY Admins"
        LifecycleEndorsement:
          Type: ImplicitMeta
          Rule: "MAJORITY Endorsement"
        Endorsement:
          Type: ImplicitMeta
          Rule: "MAJORITY Endorsement"
      Capabilities:
        <<: *ApplicationCapabilities

    Orderer: &OrdererDefaults
      OrdererType: etcdraft
      BatchTimeout: {{  .Values.network.batch.timeout | default "2s" }}
      BatchSize:
        MaxMessageCount: {{ .Values.network.batch.maxMessageCount | default 500 }}
        AbsoluteMaxBytes: {{ .Values.network.batch.absoluteMaxBytes | default "10 MB" }}
        PreferredMaxBytes: {{ .Values.network.batch.preferredMaxBytes | default "2 MB" }}
      EtcdRaft:
        Consenters:
    {{- range $org := .Values.network.organizations }}
    {{- if gt (int (default 0 $org.orderers)) 0 }}
    {{- range $i, $_ := until (int (default 0 $org.orderers)) }}
          - Host: {{ $org.name }}-orderer-{{ $i }}
            Port: 7050
            ClientTLSCert: /workspace/organizations/ordererOrganizations/{{ $org.name }}/orderers/orderer{{ $i }}.{{ $org.name }}/tls/server.crt
            ServerTLSCert: /workspace/organizations/ordererOrganizations/{{ $org.name }}/orderers/orderer{{ $i }}.{{ $org.name }}/tls/server.crt
    {{- end }}
    {{- end }}
    {{- end }}
      Organizations:
      Policies:
        Readers:
          Type: ImplicitMeta
          Rule: "ANY Readers"
        Writers:
          Type: ImplicitMeta
          Rule: "ANY Writers"
        Admins:
          Type: ImplicitMeta
          Rule: "MAJORITY Admins"
        BlockValidation:
          Type: ImplicitMeta
          Rule: "ANY Writers"
      Capabilities:
        <<: *OrdererCapabilities

    Channel: &ChannelDefaults
      Policies:
        Readers:
          Type: ImplicitMeta
          Rule: "ANY Readers"
        Writers:
          Type: ImplicitMeta
          Rule: "ANY Writers"
        Admins:
          Type: ImplicitMeta
          Rule: "MAJORITY Admins"
      Capabilities:
        <<: *ChannelCapabilities

    Profiles:
      TwoOrgsChannel:
        <<: *ChannelDefaults
        Consortium: SampleConsortium
        Orderer:
          <<: *OrdererDefaults
          Organizations:
    {{- range $org := .Values.network.organizations }}
    {{- if gt (int (default 0 $org.orderers)) 0 }}
            - *{{ $org.name | title }}Orderer
    {{- end }}
    {{- end }}
        Application:
          <<: *ApplicationDefaults
          Organizations:
    {{- range $org := .Values.network.organizations }}
    {{- if gt (int (default 0 $org.peers)) 0 }}
            - *{{ $org.name | title }}Peer
    {{- end }}
    {{- end }}
          Capabilities:
            <<: *ApplicationCapabilities

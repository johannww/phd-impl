{{- $ns := include "fabric-experiments.namespace" . -}}
{{- $serviceType := .Values.network.serviceType | default "NodePort" -}}
{{- range $org := .Values.network.organizations }}
{{- $orgName := $org.name }}
{{- $base := int (default 30050 $org.nodePortBase) }}
{{- range $i, $_ := until (int (default 0 $org.orderers)) }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $orgName }}-orderer-{{ $i }}
  namespace: {{ $ns }}
  labels:
    {{- include "fabric-experiments.labels" $ | nindent 4 }}
    app.kubernetes.io/component: orderer
    app.kubernetes.io/org: {{ $orgName }}
spec:
  type: {{ $serviceType }}
  selector:
    app.kubernetes.io/component: orderer
    app.kubernetes.io/org: {{ $orgName }}
    app.kubernetes.io/node-id: "orderer-{{ $i }}"
  ports:
    - name: orderer
      port: 7050
      targetPort: 7050
      {{- if eq $serviceType "NodePort" }}
      nodePort: {{ add $base $i }}
      {{- end }}
    - name: orderer-admin
      port: 9443
      targetPort: 9443
    - name: metrics
      port: 8443
      targetPort: 8443
      {{- if eq $serviceType "NodePort" }}
      nodePort: {{ add (add $base $i) 1000 }}
      {{- end }}
{{- end }}
{{- range $i, $_ := until (int (default 0 $org.peers)) }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $orgName }}-peer-{{ $i }}
  namespace: {{ $ns }}
  labels:
    {{- include "fabric-experiments.labels" $ | nindent 4 }}
    app.kubernetes.io/component: peer
    app.kubernetes.io/org: {{ $orgName }}
spec:
  type: {{ $serviceType }}
  selector:
    app.kubernetes.io/component: peer
    app.kubernetes.io/org: {{ $orgName }}
    app.kubernetes.io/node-id: "peer-{{ $i }}"
  ports:
    - name: peer
      port: 7051
      targetPort: 7051
      {{- if eq $serviceType "NodePort" }}
      nodePort: {{ add $base $i }}
      {{- end }}
    - name: metrics
      port: 9443
      targetPort: 9443
      {{- if eq $serviceType "NodePort" }}
      nodePort: {{ add (add $base $i) 1000 }}
      {{- end }}
{{- end }}
{{- end }}

{{- $chaincodes := .Values.chaincodes | default (list .Values.chaincode) -}}
{{- $firstOrdererOrg := dict "name" "" -}}
{{- range $org := .Values.network.organizations }}
{{- if and (eq (get $firstOrdererOrg "name") "") (gt (int (default 0 $org.orderers)) 0) }}
{{- $_ := set $firstOrdererOrg "name" $org.name -}}
{{- end }}
{{- end }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "chaincode-service.name" . }}-scripts
  namespace: {{ include "chaincode-service.namespace" . }}
  labels:
    {{- include "chaincode-service.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "10"
    "helm.sh/hook-delete-policy": before-hook-creation
data:
  cc-package-install.sh: |
    #!/usr/bin/env bash
    set -euo pipefail
    wait_for_endpoint() {
      local host="$1"
      local port="$2"
      until echo | openssl s_client -connect "${host}:${port}" -servername "${host}" >/dev/null 2>&1; do
        echo "waiting for ${host}:${port}"
        sleep 2
      done
    }
{{- range $cc := $chaincodes }}
{{- $ccName := ($cc.name | default "chaincode") | lower -}}
{{- $ccPort := default 7055 $cc.servicePort -}}
{{- range $org := $.Values.network.organizations }}
{{- if gt (int (default 0 $org.peers)) 0 }}
    package_file="/packages/{{ $ccName }}_{{ $org.name }}.tar.gz"
    if [ ! -s "${package_file}" ]; then
      echo "missing chaincode package ${package_file}"
      exit 1
    fi
{{- range $i, $_ := until (int (default 0 $org.peers)) }}
    wait_for_endpoint "{{ $org.name }}-peer-{{ $i }}" "7051"
    export CORE_PEER_TLS_ENABLED=true
    export CORE_PEER_ADDRESS="{{ $org.name }}-peer-{{ $i }}:7051"
    export CORE_PEER_LOCALMSPID="{{ $org.name | title }}MSP"
    export CORE_PEER_MSPCONFIGPATH="{{ $.Values.workspace }}/organizations/peerOrganizations/{{ $org.name }}/users/Admin@{{ $org.name }}/msp"
    export CORE_PEER_TLS_ROOTCERT_FILE="{{ $.Values.workspace }}/organizations/peerOrganizations/{{ $org.name }}/peers/peer{{ $i }}.{{ $org.name }}/tls/ca.crt"
    echo "installing {{ $ccName }} on {{ $org.name }} peer{{ $i }} from ${package_file}"
    set +e
    install_output=$(peer lifecycle chaincode install "${package_file}" 2>&1)
    install_status=$?
    set -e
    if [ ${install_status} -ne 0 ]; then
      if [[ "${install_output}" == *"already successfully installed"* ]]; then
        echo "package from ${package_file} already installed on {{ $org.name }} peer{{ $i }}; skipping"
      else
        echo "failed to install package from ${package_file} on {{ $org.name }} peer{{ $i }}"
        echo "${install_output}"
        exit 1
      fi
    fi
{{- end }}
{{- end }}
{{- end }}
{{- end }}
  cc-approve-and-commit.sh: |
    #!/usr/bin/env bash
    set -euo pipefail
    wait_for_endpoint() {
      local host="$1"
      local port="$2"
      until echo | openssl s_client -connect "${host}:${port}" -servername "${host}" >/dev/null 2>&1; do
        echo "waiting for ${host}:${port}"
        sleep 2
      done
    }
    export CORE_PEER_TLS_ENABLED=true
    export ORDERER_ADDRESS="{{ get $firstOrdererOrg "name" }}-orderer-0:7050"
    export ORDERER_TLS_CA="{{ $.Values.workspace }}/organizations/ordererOrganizations/{{ get $firstOrdererOrg "name" }}/tlsca/tlsca.{{ get $firstOrdererOrg "name" }}-cert.pem"
    wait_for_endpoint "{{ get $firstOrdererOrg "name" }}-orderer-0" "7050"
{{- range $cc := $chaincodes }}
{{- $ccName := $cc.name | lower -}}
{{- $ccVersion := default "1.0" $cc.version -}}
{{- $ccSequence := default 1 $cc.sequence }}
    sequence="{{ $ccSequence }}"
    committed_sequence=""
{{- range $org := $.Values.network.organizations }}
{{- if and (eq (get $firstOrdererOrg "name") "") (gt (int (default 0 $org.peers)) 0) }}
{{- $_ := set $firstOrdererOrg "name" $org.name -}}
{{- end }}
{{- end }}
    export CORE_PEER_ADDRESS="{{ get $firstOrdererOrg "name" }}-peer-0:7051"
    export CORE_PEER_LOCALMSPID="{{ get $firstOrdererOrg "name" | title }}MSP"
    export CORE_PEER_MSPCONFIGPATH="{{ $.Values.workspace }}/organizations/peerOrganizations/{{ get $firstOrdererOrg "name" }}/users/Admin@{{ get $firstOrdererOrg "name" }}/msp"
    export CORE_PEER_TLS_ROOTCERT_FILE="{{ $.Values.workspace }}/organizations/peerOrganizations/{{ get $firstOrdererOrg "name" }}/peers/peer0.{{ get $firstOrdererOrg "name" }}/tls/ca.crt"

    set +e
    committed_output=$(peer lifecycle chaincode querycommitted --channelID {{ $.Values.network.channelName }} --name {{ $ccName }} 2>&1)
    committed_status=$?
    set -e
    if [ ${committed_status} -eq 0 ] && [[ "${committed_output}" =~ Sequence:[[:space:]]*([0-9]+) ]]; then
      committed_sequence="${BASH_REMATCH[1]}"
    fi

    if [ -n "${committed_sequence}" ] && [ "${committed_sequence}" -ge "${sequence}" ]; then
      echo "{{ $ccName }} already committed at sequence ${committed_sequence} (desired ${sequence}); skipping approve/commit"
    else
{{- range $org := $.Values.network.organizations }}
{{- if gt (int (default 0 $org.peers)) 0 }}
{{- $pkgIDs := default (dict) $cc.packageIds -}}
{{- $ccID := required (printf "chaincodes[%s].packageIds.%s is required" $ccName $org.name) (get $pkgIDs $org.name) }}
    wait_for_endpoint "{{ $org.name }}-peer-0" "7051"
    export CORE_PEER_ADDRESS="{{ $org.name }}-peer-0:7051"
    export CORE_PEER_LOCALMSPID="{{ $org.name | title }}MSP"
    export CORE_PEER_MSPCONFIGPATH="{{ $.Values.workspace }}/organizations/peerOrganizations/{{ $org.name }}/users/Admin@{{ $org.name }}/msp"
    export CORE_PEER_TLS_ROOTCERT_FILE="{{ $.Values.workspace }}/organizations/peerOrganizations/{{ $org.name }}/peers/peer0.{{ $org.name }}/tls/ca.crt"
    set +e
    approved_output=$(peer lifecycle chaincode queryapproved --channelID {{ $.Values.network.channelName }} --name {{ $ccName }} --sequence "${sequence}" 2>&1)
    approved_status=$?
    set -e
    if [ ${approved_status} -eq 0 ]; then
      echo "{{ $ccName }} sequence ${sequence} already approved for {{ $org.name }}; skipping approval"
    else
      echo "approving {{ $ccName }} for {{ $org.name }} with package {{ $ccID }}"
      peer lifecycle chaincode approveformyorg \
        --orderer "${ORDERER_ADDRESS}" \
        --tls \
        --cafile "${ORDERER_TLS_CA}" \
        --channelID {{ $.Values.network.channelName }} \
        --name {{ $ccName }} \
        --version {{ $ccVersion }} \
        --package-id {{ $ccID }} \
        --sequence "${sequence}" \
        --collections-config /collections-config/collections_config.json
    fi
{{- end }}
{{- end }}
{{- range $org := $.Values.network.organizations }}
{{- if gt (int (default 0 $org.peers)) 0 }}
    wait_for_endpoint "{{ $org.name }}-peer-0" "7051"
{{- end }}
{{- end }}
    echo "committing {{ $ccName }} sequence ${sequence}"
    commit_args=(
      --orderer "${ORDERER_ADDRESS}"
      --tls
      --cafile "${ORDERER_TLS_CA}"
      --channelID {{ $.Values.network.channelName }}
      --name {{ $ccName }}
      --version {{ $ccVersion }}
      --sequence "${sequence}" \
      --collections-config /collections-config/collections_config.json
    )
{{- range $org := $.Values.network.organizations }}
{{- if gt (int (default 0 $org.peers)) 0 }}
    commit_args+=(--peerAddresses {{ $org.name }}-peer-0:7051)
    commit_args+=(--tlsRootCertFiles {{ $.Values.workspace }}/organizations/peerOrganizations/{{ $org.name }}/peers/peer0.{{ $org.name }}/tls/ca.crt)
{{- end }}
{{- end }}
    set +e
    commit_output=$(peer lifecycle chaincode commit "${commit_args[@]}" 2>&1)
    commit_status=$?
    set -e
    if [ ${commit_status} -ne 0 ]; then
      if [[ "${commit_output}" == *"requested sequence is"* ]] || [[ "${commit_output}" == *"new definition must be sequence"* ]]; then
        echo "{{ $ccName }} commit skipped due to sequence mismatch: ${commit_output}"
      else
        echo "failed to commit {{ $ccName }} sequence ${sequence}"
        echo "${commit_output}"
        exit 1
      fi
    fi
    fi
{{- end }}

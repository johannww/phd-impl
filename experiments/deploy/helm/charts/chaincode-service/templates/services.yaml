{{- $ns := include "chaincode-service.namespace" . -}}
{{- $chaincodes := .Values.chaincodes | default (list .Values.chaincode) -}}
{{- range $cc := $chaincodes }}
{{- $ccName := $cc.name | lower -}}
{{- $ccPort := default 7055 $cc.servicePort -}}
{{- $metricsPort := default 9443 $cc.metricsPort -}}
{{- $metricsNodePortBase := int (default 0 $cc.metricsNodePortBase) -}}
{{- range $orgIdx, $org := $.Values.network.organizations }}
{{- if gt (int (default 0 $org.peers)) 0 }}
{{- $metricsNodePort := 0 -}}
{{- if gt $metricsNodePortBase 0 }}
{{- $metricsNodePort = add $metricsNodePortBase $orgIdx -}}
{{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $ccName }}-{{ $org.name }}
  namespace: {{ $ns }}
  labels:
    {{- include "chaincode-service.labels" $ | nindent 4 }}
    app.kubernetes.io/component: chaincode-runtime
    app.kubernetes.io/org: {{ $org.name }}
    app.kubernetes.io/chaincode: {{ $ccName }}
spec:
  {{- if gt $metricsNodePort 0 }}
  type: NodePort
  {{- end }}
  selector:
    app.kubernetes.io/component: chaincode-runtime
    app.kubernetes.io/org: {{ $org.name }}
    app.kubernetes.io/chaincode: {{ $ccName }}
  ports:
    - name: chaincode
      port: {{ $ccPort }}
      targetPort: {{ $ccPort }}
    - name: metrics
      port: {{ $metricsPort }}
      targetPort: {{ $metricsPort }}
      {{- if gt $metricsNodePort 0 }}
      nodePort: {{ $metricsNodePort }}
      {{- end }}
{{- end }}
{{- end }}
{{- end }}

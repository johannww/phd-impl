# Default values for exp-app chart

# Override generated full resource names (pod/pvc/etc.)
# Set to "exp-app" to get pod name exactly "exp-app"
fullnameOverride: ""

# Number of exp-app pods to deploy (for multi-user simulation)
replicaCount: 1

image:
  repository: ghcr.io/johannww/phd-impl/exp-app
  tag: latest
  pullPolicy: Always

# Pod resources
resources:
  requests:
    memory: "512Mi"
    cpu: "500m"
  limits:
    memory: "2Gi"
    cpu: "2000m"

# Storage configuration
storage:
  # Results PVC configuration
  results:
    enabled: true
    storageClassName: azurefile-csi  # Use azurefile for AKS, standard for Minikube
    accessMode: ReadWriteMany
    size: 2Gi
  
  # Reference to organizations PVC (created by main fabric chart)
  organizationsClaimName: organizations
  
  # Mount paths
  workspacePath: /workspace/organizations
  resultsPath: /results
  configPath: /config

# Network profile configuration
networkProfile:
  # ConfigMap name containing network-profile.json
  configMapName: network-profile

# SICAR TLS secret mount for trusted provider registration
sicarTLS:
  enabled: true
  secretName: sicar-mock-tls
  mountPath: /workspace/sicar

# exp-app runtime configuration
app:
  # Target organization from network-profile (empty = first organization)
  organization: ""
  # Number of users to run in this pod (0 = all users found in profile)
  userCount: 0
  # Run setup initialization in this pod
  runSetup: true
  # Run coupled auction routine in this pod
  runCoupled: true

# Fabric network layout used to create one exp-app pod per peer organization
network:
  userCount: 1
  organizations: []
  # Example:
  # organizations:
  #   - name: mma
  #     peers: 1
  #   - name: farmers
  #     peers: 1

# Pod behavior
pod:
  # Keep pod running (don't execute exp-app automatically)
  keepAlive: true
  
  # Restart policy
  restartPolicy: Always
  
  # Custom command (used when keepAlive is false)
  # If not specified, defaults to ["/app/exp-app"]
  command: []
    # - /app/exp-app
  
  # Custom args (used when keepAlive is false)
  args: []
    # - --profile=/config/network-profile.json
    # - --duration=5m
  
  # Environment variables
  env: []
    # - name: CUSTOM_VAR
    #   value: "value"

# Service account (optional, for future RBAC)
serviceAccount:
  create: false
  name: ""

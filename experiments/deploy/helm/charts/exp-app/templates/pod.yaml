{{- $idx := 0 -}}
{{- range $org := .Values.network.organizations }}
{{- if gt (int (default 0 $org.peers)) 0 }}
apiVersion: v1
kind: Pod
metadata:
  name: {{ include "exp-app.orgFullname" (dict "root" $ "org" $org.name) }}
  namespace: {{ include "exp-app.namespace" $ }}
  labels:
    {{- include "exp-app.labels" $ | nindent 4 }}
    exp-app.organization: {{ $org.name | quote }}
spec:
  {{- if $.Values.serviceAccount.create }}
  serviceAccountName: {{ default (include "exp-app.fullname" $) $.Values.serviceAccount.name }}
  {{- end }}
  restartPolicy: {{ $.Values.pod.restartPolicy }}
  terminationGracePeriodSeconds: 0
  containers:
  - name: exp-app
    image: "{{ $.Values.image.repository }}:{{ $.Values.image.tag }}"
    imagePullPolicy: {{ $.Values.image.pullPolicy }}
    {{- if $.Values.pod.keepAlive }}
    command: ["/bin/sh"]
    args: ["-c", "while true; do sleep 3600; done"]
    {{- else }}
    {{- if $.Values.pod.command }}
    command: {{ toYaml $.Values.pod.command | nindent 6 }}
    {{- else }}
    command: ["/app/exp-app"]
    {{- end }}
    {{- if $.Values.pod.args }}
    args: {{ toYaml $.Values.pod.args | nindent 6 }}
    {{- end }}
    {{- end }}
    volumeMounts:
    - name: organizations
      mountPath: {{ $.Values.storage.workspacePath }}
      readOnly: true
    - name: results
      mountPath: {{ $.Values.storage.resultsPath }}
    - name: network-profile
      mountPath: {{ $.Values.storage.configPath }}
      readOnly: true
    {{- if $.Values.sicarTLS.enabled }}
    - name: sicar-tls
      mountPath: {{ $.Values.sicarTLS.mountPath }}
      readOnly: true
    {{- end }}
    env:
    - name: EXP_APP_ORGANIZATION
      value: {{ $org.name | quote }}
    - name: EXP_APP_USER_COUNT
      value: {{ $.Values.network.userCount | quote }}
    - name: EXP_APP_RUN_SETUP
      value: {{ eq $idx 0 | quote }}
    - name: EXP_APP_RUN_COUPLED
      value: {{ eq $idx 0 | quote }}
    - name: NAMESPACE
      valueFrom:
        fieldRef:
          fieldPath: metadata.namespace
    {{- with $.Values.pod.env }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    {{- with $.Values.resources }}
    resources:
      {{- toYaml . | nindent 6 }}
    {{- end }}
  volumes:
  - name: organizations
    persistentVolumeClaim:
      claimName: {{ $.Values.storage.organizationsClaimName }}
  - name: results
    persistentVolumeClaim:
      claimName: {{ include "exp-app.fullname" $ }}-results
  - name: network-profile
    configMap:
      name: {{ $.Values.networkProfile.configMapName }}
  {{- if $.Values.sicarTLS.enabled }}
  - name: sicar-tls
    secret:
      secretName: {{ $.Values.sicarTLS.secretName }}
      items:
      - key: tls.crt
        path: server.crt
      - key: tls.key
        path: server.key
  {{- end }}
---
{{- $idx = add1 $idx -}}
{{- end }}
{{- end }}

global:
  fabricVersion: "3.1.4"
  namespace: ""

images:
  peer:
    repository: "ghcr.io/hyperledger/fabric-peer"
    tag: "3.1.4"
    pullPolicy: IfNotPresent
  orderer:
    repository: "ghcr.io/hyperledger/fabric-orderer"
    tag: "3.1.4"
    pullPolicy: IfNotPresent
  tools:
    repository: "ghcr.io/hyperledger/fabric-tools"
    tag: "3.1.4"
    pullPolicy: IfNotPresent

# collections are defined in ../../../chaincodes/common/state/collections.go
network: &defaultNetwork
  channelName: "carbon"
  externalIPs: []
  userCount: 1
  peerLedgerStateTotalQueryLimit: 150000
  batch:
    timeout: "500ms"
    maxMessageCount: 500
    absoluteMaxBytes: "10 MB"
    preferredMaxBytes: "2 MB"
  organizations:
    - name: "mma"
      peers: 1
      nodePortBase: 30060
      collections:
        - "bidsPvtCollection"
        - "companiesPvtCollection"
        - "auctionPvtCollection"
        - "regulatoryPvtCollection"
    - name: "farmers"
      peers: 1
      nodePortBase: 30070
      collections:
        - "bidsPvtCollection"
        - "companiesPvtCollection"
        - "auctionPvtCollection"
    - name: "companies"
      peers: 1
      nodePortBase: 30080
      collections:
        - "bidsPvtCollection"
        - "companiesPvtCollection"
        - "auctionPvtCollection"
    - name: "orderer"
      orderers: 2
      nodePortBase: 30090

storage:
  organizations:
    size: "1Gi"
    accessModes:
      - ReadWriteMany
    storageClassName: ""

operations:
  workspace: "/workspace"
  certGenerationCommands: |
    cryptogen generate --config /crypto/crypto-config.yaml --output /workspace/organizations
  configtxCreateCommands: |
    export FABRIC_CFG_PATH=/configtx
    configtxgen -profile TwoOrgsChannel -channelID ${FABRIC_CHANNEL} -outputCreateChannelTx ${CHANNEL_TX_FILE}
    configtxgen -profile TwoOrgsChannel -channelID ${FABRIC_CHANNEL} -outputBlock ${CHANNEL_BLOCK_FILE}
  channelCreationCommands: |
    peer channel create -o ${ORDERER_ADDRESS} -c ${FABRIC_CHANNEL} -f ${CHANNEL_TX_FILE} --outputBlock ${CHANNEL_BLOCK_FILE} --tls --cafile "${ORDERER_TLS_CA}"
  chaincodeLifecycleCommands: |
    peer lifecycle chaincode package /workspace/pkg/carbon.tar.gz --path /workspace/chaincodes/carbon --lang golang --label carbon_1.0
    peer lifecycle chaincode install /workspace/pkg/carbon.tar.gz
    peer lifecycle chaincode approveformyorg -o ${ORDERER_ADDRESS} --tls --cafile "${ORDERER_TLS_CA}" --channelID ${FABRIC_CHANNEL} --name carbon --version 1.0 --package-id "${CARBON_PACKAGE_ID}" --sequence 1
    peer lifecycle chaincode commit -o ${ORDERER_ADDRESS} --tls --cafile "${ORDERER_TLS_CA}" --channelID ${FABRIC_CHANNEL} --name carbon --version 1.0 --sequence 1
    peer lifecycle chaincode package /workspace/pkg/interop.tar.gz --path /workspace/chaincodes/interop --lang golang --label interop_1.0
    peer lifecycle chaincode install /workspace/pkg/interop.tar.gz
    peer lifecycle chaincode approveformyorg -o ${ORDERER_ADDRESS} --tls --cafile "${ORDERER_TLS_CA}" --channelID ${FABRIC_CHANNEL} --name interop --version 1.0 --package-id "${INTEROP_PACKAGE_ID}" --sequence 1
    peer lifecycle chaincode commit -o ${ORDERER_ADDRESS} --tls --cafile "${ORDERER_TLS_CA}" --channelID ${FABRIC_CHANNEL} --name interop --version 1.0 --sequence 1
  invokeCommands: |
    peer chaincode invoke -o ${ORDERER_ADDRESS} --tls --cafile "${ORDERER_TLS_CA}" -C ${FABRIC_CHANNEL} -n carbon -c '{"function":"InitLedger","Args":[]}'
  queryCommands: |
    peer chaincode query -C ${FABRIC_CHANNEL} -n carbon -c '{"function":"GetAllAssets","Args":[]}'

chaincodeService:
  enabled: false
  workspace: "/workspace"
  organizationsClaimName: ""
  network: *defaultNetwork
  chaincodes:
    - name: "carbon"
      version: "1.0"
      sequence: 1
      packageLabel: ""
      image:
        repository: "ghcr.io/johannww/phd-impl/carbon"
        tag: "latest"
        pullPolicy: IfNotPresent
      servicePort: 7055
      metricsPort: 9443
      metricsNodePortBase: 30100
      command: []
      args: []
    - name: "interop"
      version: "1.0"
      sequence: 1
      packageLabel: ""
      image:
        repository: "ghcr.io/johannww/phd-impl/interop"
        tag: "latest"
        pullPolicy: IfNotPresent
      servicePort: 7055
      metricsPort: 9443
      metricsNodePortBase: 30200
      command: []
      args: []

sicar:
  enabled: true
  image:
    repository: "ghcr.io/johannww/phd-impl/data-api"
    tag: "latest"
    pullPolicy: IfNotPresent
  mockgen:
    count: 100
    seed: "sicar-dev"
  servicePort: 8443
  nodePort: 30443
